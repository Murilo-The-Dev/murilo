<ion-page>
  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-back-button defaultHref="/dashboard"></ion-back-button>
      </ion-buttons>
      <ion-title>Vendas</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <ion-list>
      <ion-item-sliding *ngFor="let sale of sales">
        <ion-item>
          <ion-label>
            <h2>{{ sale.client_name }}</h2>
            <p>{{ money(sale.total || 0) }} - {{ sale.created_at | date:'short' }}</p>
          </ion-label>
          <ion-badge slot="end" [color]="statusColor(sale.status)">{{ sale.status }}</ion-badge>
        </ion-item>

        <ion-item-options side="end" *ngIf="sale.status === 'pending'">
          <ion-item-option color="danger" (click)="confirmCancel(sale)">Cancelar</ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>

    <ion-fab vertical="bottom" horizontal="end" slot="fixed">
      <ion-fab-button routerLink="/sales/create">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </ion-fab>
  </ion-content>
</ion-page>
