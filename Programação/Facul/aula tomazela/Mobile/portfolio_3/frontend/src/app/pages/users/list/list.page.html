<ion-page>
  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-back-button defaultHref="/dashboard"></ion-back-button>
      </ion-buttons>
      <ion-title>Usuarios</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <ion-searchbar placeholder="Buscar por nome ou email" (ionInput)="onSearch($event)"></ion-searchbar>

    <ion-list>
      <ion-item-sliding *ngFor="let user of filteredUsers">
        <ion-item>
          <ion-label>
            <h2>{{ user.name }}</h2>
            <p>{{ user.email }}</p>
          </ion-label>
          <ion-badge slot="end" [color]="badgeColor(user.active)">
            {{ user.active ? 'Ativo' : 'Inativo' }}
          </ion-badge>
        </ion-item>

        <ion-item-options side="end">
          <ion-item-option color="primary" (click)="openForm(user)">Editar</ion-item-option>
          <ion-item-option color="warning" (click)="confirmToggle(user)">Toggle</ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>

    <ion-fab vertical="bottom" horizontal="end" slot="fixed">
      <ion-fab-button (click)="openForm()">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </ion-fab>
  </ion-content>
</ion-page>
