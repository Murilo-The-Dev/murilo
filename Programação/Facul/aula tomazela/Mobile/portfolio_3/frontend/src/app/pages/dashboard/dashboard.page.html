<ion-page>
  <ion-header>
    <ion-toolbar>
      <ion-title>Dashboard</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <ion-grid>
      <ion-row>
        <ion-col size="6">
          <ion-card button (click)="go('/users')">
            <ion-card-content>
              <ion-icon name="people-outline"></ion-icon>
              <h2>Usuarios</h2>
              <p>{{ counts.users }} registros</p>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col size="6">
          <ion-card button (click)="go('/products')">
            <ion-card-content>
              <ion-icon name="cube-outline"></ion-icon>
              <h2>Produtos</h2>
              <p>{{ counts.products }} registros</p>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col size="6">
          <ion-card button (click)="go('/clients')">
            <ion-card-content>
              <ion-icon name="person-outline"></ion-icon>
              <h2>Clientes</h2>
              <p>{{ counts.clients }} registros</p>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col size="6">
          <ion-card button (click)="go('/sales')">
            <ion-card-content>
              <ion-icon name="cart-outline"></ion-icon>
              <h2>Vendas</h2>
              <p>{{ counts.sales }} registros</p>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col size="6">
          <ion-card button (click)="go('/receivables')">
            <ion-card-content>
              <ion-icon name="cash-outline"></ion-icon>
              <h2>Receber</h2>
              <p>{{ counts.receivables }} abertos</p>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col size="6">
          <ion-card button (click)="go('/reports')">
            <ion-card-content>
              <ion-icon name="analytics-outline"></ion-icon>
              <h2>Relatorios</h2>
              <p>{{ counts.reports }} itens</p>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-content>
</ion-page>
